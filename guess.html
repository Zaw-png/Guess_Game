<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guess Game</title>

    <link rel="stylesheet" href="guesss-game.css">
</head>

<body>

<div class="main-container">

    <h2>Guess Game</h2>

    <p>Guess a number between 1 - 20, you have 5 chances.</p>

    <div class="input">

        <input type="text" id="guess-value">

        <button type="button" id="guess-btn">Guess!</button>

        <button type="button" id="restart-btn">Restart</button>

    </div>

    <hr>

    <div id="attempt-text">
        Attempt <span id="attempt">0</span>/5
    </div>

    <div id="result"></div>

</div>

<script>

let target = 0;
let attempt = 0;
const maxAttempt = 5;

const guessInput = document.getElementById("guess-value");
const guessBtn = document.getElementById("guess-btn");
const restartBtn = document.getElementById("restart-btn");
const attemptDisplay = document.getElementById("attempt");
const result = document.getElementById("result");

// Initial State
guessInput.value = "";
guessBtn.style.display = "none";
restartBtn.style.display = "block";
attemptDisplay.textContent = "0";
result.textContent = "";

// Check numeric
function isNumeric(value){
    return value.trim() !== "" && !isNaN(value);
}

// Restart Game
restartBtn.onclick = function(){

    target = Math.floor(Math.random() * 20) + 1;

    attempt = 0;

    attemptDisplay.textContent = attempt;

    result.textContent = "";

    guessInput.value = "";

    guessInput.focus();

    restartBtn.style.display = "none";

    guessBtn.style.display = "block";

    console.log(target);

};

// Guess
guessBtn.onclick = function(){

    let value = guessInput.value;

    if(!isNumeric(value)){
        return;
    }

    value = Number(value);

    attempt++;

    attemptDisplay.textContent = attempt;

    if(value > target){

        result.textContent = value + " is too high";

    }
    else if(value < target){

        result.textContent = value + " is too low";

    }
    else{

        result.textContent = "You WIN";

        guessBtn.style.display = "none";
        restartBtn.style.display = "block";

        guessInput.value = "";
        guessInput.focus();

        return;
    }

    if(attempt >= maxAttempt){

        result.textContent = "You LOSE";

        guessBtn.style.display = "none";
        restartBtn.style.display = "block";

    }

    guessInput.value = "";
    guessInput.focus();

};

</script>

</body>
</html>
